<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order — The Artspire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="">
<div id="site-header"></div>

<div class="wrap page-hero">
  <span class="eyebrow rv">Order status</span>
  <h1 class="reveal-words">Track your <em>order</em>.</h1>
  <p class="rv d2">Enter your order number and phone to see where your piece is.</p>
</div>

<section style="padding-top:6px">
  <div class="wrap" style="max-width:640px">
    <div class="card-box rv">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="field" style="margin-bottom:0"><label>Order number</label><input type="text" placeholder="ART-20260718-0001"></div>
        <div class="field" style="margin-bottom:0"><label>Phone</label><input type="tel" placeholder="+91"></div>
      </div>
      <button class="btn btn-solid btn-block" style="margin-top:18px"><span>Track Order</span></button>
    </div>

    <div class="card-box rv d1" style="margin-top:28px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
        <div><div class="cat" style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600">Order</div><h3 class="serif" style="font-size:22px;color:var(--forest);font-weight:500">ART-20260718-0001</h3></div>
        <span style="font-size:12px;background:#F3EAD8;border:1px solid #E4D5B4;color:#8A6D2A;font-weight:600;padding:6px 12px;border-radius:2px">Processing</span>
      </div>
      <div class="timeline">
        <div class="tl-step done"><div class="d"></div><div class="lab">Confirmed</div></div>
        <div class="tl-step done"><div class="d"></div><div class="lab">Crafting</div></div>
        <div class="tl-step"><div class="d"></div><div class="lab">Shipped</div></div>
        <div class="tl-step"><div class="d"></div><div class="lab">Delivered</div></div>
      </div>
      <p style="font-size:13px;color:#54514a;text-align:center;border-top:1px solid var(--line);padding-top:16px">Your piece is being hand-finished in the studio. We'll email you a tracking link once it ships.</p>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
</body>
</html>
